name: PantheonPrime Pulse — Eternal Loop

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours as a backup trigger

jobs:
  pulse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests aiohttp

      - name: Run Pulse Cycle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pulse.py

      - name: Commit State & Memory
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Pulse Cycle Complete [skip ci]" || echo "No changes to commit"
          git push

      - name: Self-Restart
        if: always()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/pulse.yml/dispatches \
            -d '{"ref":"master"}'
